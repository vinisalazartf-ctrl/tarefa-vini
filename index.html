// =====================
// SEMANAS DO MÊS
// =====================
function getWeekKey(date) {
  const d = new Date(date);
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() + 4 - (d.getDay() || 7));
  const yearStart = new Date(d.getFullYear(), 0, 1);
  const week = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
  return d.getFullYear() + '-W' + String(week).padStart(2,'0');
}

// Retorna a segunda-feira de uma semana ISO
function getMondayOfWeek(weekKey) {
  const [year, w] = weekKey.split('-W').map(Number);
  const jan4 = new Date(year, 0, 4);
  const startOfW1 = new Date(jan4);
  startOfW1.setDate(jan4.getDate() - (jan4.getDay() || 7) + 1);
  const monday = new Date(startOfW1);
  monday.setDate(startOfW1.getDate() + (w - 1) * 7);
  return monday;
}

// Retorna as semanas restantes do mês atual (excluindo a semana atual)
function getSemanasFuturasMes() {
  const hoje = new Date();
  const semanaAtual = getWeekKey(hoje);
  const mes = hoje.getMonth();
  const ano = hoje.getFullYear();

  const semanas = [];
  // Verificar semanas 1-6 do mês
  const d = new Date(ano, mes, 1);
  const seen = new Set();
  while (d.getMonth() === mes) {
    const wk = getWeekKey(d);
    if (!seen.has(wk) && wk > semanaAtual) {
      const monday = getMondayOfWeek(wk);
      const friday = new Date(monday);
      friday.setDate(monday.getDate() + 4);
      // Só inclui se a semana ainda está no mês ou começa no mês
      if (monday.getMonth() === mes || friday.getMonth() === mes) {
        semanas.push(wk);
      }
      seen.add(wk);
    }
    d.setDate(d.getDate() + 1);
  }
  return semanas;
}

// Retorna label da semana ex: "Sem 2 — 19/05"
function getLabelSemana(weekKey, idx) {
  const monday = getMondayOfWeek(weekKey);
  const friday = new Date(monday);
  friday.setDate(monday.getDate() + 4);
  const fmt = d => d.toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit' });
  return { short: `Sem ${idx+2}`, full: `Semana ${idx+2} — ${fmt(monday)} a ${fmt(friday)}`, monday, friday };
}

// Dias da semana futura com datas
function getDiasDaSemana(weekKey) {
  const monday = getMondayOfWeek(weekKey);
  return DIAS_SEMANA.map((nome, i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    return { nome, data: d };
  });
}

// =====================
// STATE & STORAGE
// =====================
const STORAGE_KEY = 'vini_roteiro_v3';

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  const state = { semana: SEMANA_ATUAL, tarefas: {}, checks: {}, historico: [], historicoSemanas: [], tarefasFuturas: {} };

    state.tarefas[dia] = JSON.parse(JSON.stringify(TAREFAS_INICIAIS[dia]));
    state.checks[dia] = {};
  }
  return state;
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

  if (!state.historicoSemanas) state.historicoSemanas = [];
  state.historicoSemanas.push({
    semana: state.semana,
    checks: JSON.parse(JSON.stringify(state.checks)),
    historico: JSON.parse(JSON.stringify(state.historico || []))
  });
  if (state.historicoSemanas.length > 8) state.historicoSemanas = state.historicoSemanas.slice(-8);
  for (const dia of DIAS) { state.checks[dia] = {}; }
  state.historico = [];
  state.semana = SEMANA_ATUAL;
}

for (const dia of DIAS) {
  if (!state.tarefas[dia]) state.tarefas[dia] = JSON.parse(JSON.stringify(TAREFAS_INICIAIS[dia]));
  if (!state.checks[dia]) state.checks[dia] = {};
}
if (!state.tarefasFuturas) state.tarefasFuturas = {};
saveState();

// =====================
// NAVEGAÇÃO
// =====================
const JS_DIA_MAP = { 0:'Mensal', 1:'Segunda', 2:'Terça', 3:'Quarta', 4:'Quinta', 5:'Sexta', 6:'Mensal' };
let diaAtual = JS_DIA_MAP[new Date().getDay()] || 'Segunda';
let diaSelected = diaAtual;
let semanaFuturaSelected = null; // weekKey
let diaFuturoSelected = 'Segunda';
let historicoOpen = false;
const semanasFuturas = getSemanasFuturasMes();

// =====================
// TABS
// =====================
function renderTabs() {
  const tabs = document.getElementById('tabs');
  let html = DIAS.map(dia => {
    const pct = getPct(dia);
    const isHoje = dia === diaAtual;
    const isSelected = !semanaFuturaSelected && dia === diaSelected;
    return `<button class="tab ${isSelected ? 'active' : ''} ${isHoje && !isSelected ? 'hoje-tab' : ''}" onclick="selectDia('${dia}')">
      ${dia === 'Mensal' ? '📅 Mensal' : dia}${isHoje && dia !== 'Mensal' ? ' 🔥' : ''}
      <span class="prog">${pct}%</span>
    </button>`;
  }).join('');

  // Semanas futuras
  semanasFuturas.forEach((wk, idx) => {
    const info = getLabelSemana(wk, idx);
    const isSelected = semanaFuturaSelected === wk;
    const pct = getPctFutura(wk);
    html += `<button class="tab ${isSelected ? 'active' : 'semana-futura'}" onclick="selectSemanaFutura('${wk}')">
      ${info.short}
      <span class="prog">${pct}%</span>
    </button>`;
  });

  tabs.innerHTML = html;
}

// =====================
// PROGRESSO
// =====================
function getPct(dia) {
  const tarefas = state.tarefas[dia] || [];
  if (!tarefas.length) return 0;
  const done = tarefas.filter(t => state.checks[dia] && state.checks[dia][t.id]).length;
  return Math.round((done / tarefas.length) * 100);
}

function getPctFutura(weekKey) {
  const tf = state.tarefasFuturas[weekKey] || {};
  let total = 0, done = 0;
  for (const dia of DIAS_SEMANA) {
    const tarefas = tf[dia] || [];
    total += tarefas.length;
    const checks = (state.checks['fut_'+weekKey+'_'+dia] || {});
    done += tarefas.filter(t => checks[t.id]).length;
  }
  if (!total) return 0;
  return Math.round((done / total) * 100);
}

// =====================
// RENDER PRINCIPAL
// =====================
function renderMain() {
  if (semanaFuturaSelected) {
    renderSemanaFutura();
  } else {
    renderDia();
  }
}

function renderDia() {
  const dia = diaSelected;
  const tarefas = state.tarefas[dia] || [];
  const checks = state.checks[dia] || {};
  const pct = getPct(dia);

  const manhãIds = new Set(PERIODOS_MANHÃ[dia] || []);
  const tarefasManhã = tarefas.filter(t => manhãIds.has(t.id) || t.turno === 'manhã' && !manhãIds.has(t.id));
  const tarefasTarde = tarefas.filter(t => !manhãIds.has(t.id) && t.turno !== 'manhã');
  const tarefasCustomManhã = tarefas.filter(t => !manhãIds.has(t.id) && t.turno === 'manhã' && t.id.startsWith('custom_'));

  let html = `<div class="progress-card">
    <div class="progress-info">
      <div class="progress-label">Progresso — ${dia === 'Mensal' ? 'Mensal' : dia}</div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="progress-pct">${pct}%</div>
  </div>`;

  // Manhã
  const labelManhã = LABELS_MANHÃ[dia] || 'Manhã';
  const itensManhã = tarefas.filter(t => manhãIds.has(t.id));
  const customManhã = tarefas.filter(t => !manhãIds.has(t.id) && t.turno === 'manhã');
  if (itensManhã.length || customManhã.length) {
    html += `<div class="periodo-label">${labelManhã}</div>`;
    for (const t of [...itensManhã, ...customManhã]) html += renderTarefa(t, !!checks[t.id], dia);
  }

  // Tarde
  if (dia !== 'Mensal') {
    const labelTarde = LABELS_TARDE[dia] || 'Tarde';
    const itensTarde = tarefas.filter(t => !manhãIds.has(t.id) && t.turno !== 'manhã' && !t.id.startsWith('custom_'));
    const customTarde = tarefas.filter(t => t.id.startsWith('custom_') && t.turno !== 'manhã');
    if (itensTarde.length || customTarde.length) {
      html += `<div class="periodo-label">${labelTarde}</div>`;
      for (const t of [...itensTarde, ...customTarde]) html += renderTarefa(t, !!checks[t.id], dia);
    }
  }

  if (!tarefas.length) html += `<div class="empty-state">Nenhuma tarefa. Adicione abaixo 👇</div>`;

  html += renderAddSection(dia, false);

  const doneCount = tarefas.filter(t => checks[t.id]).length;
  if (doneCount > 0) {
    html += `<div class="actions-row">
      <button class="btn-clear" onclick="clearDone()">🗑️ Remover concluídas (${doneCount})</button>
      <button class="btn-clear" onclick="uncheckAll()" style="border-color:rgba(123,47,190,0.3);color:rgba(155,63,222,0.7)">↺ Desmarcar todas</button>
    </div>`;
  }

  html += `<button class="historico-btn" onclick="toggleHistorico()">📋 Histórico ${historicoOpen ? '▲' : '▼'}</button>
  <div class="historico-panel ${historicoOpen ? 'open' : ''}">${renderHistorico()}</div>`;

  document.getElementById('main').innerHTML = html;
}

function renderSemanaFutura() {
  const wk = semanaFuturaSelected;
  const idx = semanasFuturas.indexOf(wk);
  const info = getLabelSemana(wk, idx);
  const dias = getDiasDaSemana(wk);

  if (!state.tarefasFuturas[wk]) state.tarefasFuturas[wk] = {};
  for (const { nome } of dias) {
    if (!state.tarefasFuturas[wk][nome]) {
      state.tarefasFuturas[wk][nome] = JSON.parse(JSON.stringify(TAREFAS_INICIAIS[nome] || []));
    }
    const chkKey = 'fut_' + wk + '_' + nome;
    if (!state.checks[chkKey]) state.checks[chkKey] = {};
  }

  const pct = getPctFutura(wk);

  let html = `
  <div class="semana-header">
    <div class="semana-header-label">${info.full}</div>
  </div>
  <div class="progress-card">
    <div class="progress-info">
      <div class="progress-label">Progresso da semana</div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="progress-pct">${pct}%</div>
  </div>
  <div class="subtabs-wrapper">
    <div class="subtabs">
      ${dias.map(({ nome, data }) => {
        const fmt = data.toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit' });
        return `<button class="subtab ${diaFuturoSelected === nome ? 'active' : ''}" onclick="selectDiaFuturo('${nome}')">${nome} ${fmt}</button>`;
      }).join('')}
    </div>
  </div>`;

  const dia = diaFuturoSelected;
  const chkKey = 'fut_' + wk + '_' + dia;
  const tarefas = state.tarefasFuturas[wk][dia] || [];
  const checks = state.checks[chkKey] || {};
  const manhãIds = new Set(PERIODOS_MANHÃ[dia] || []);

  const itensManhã = tarefas.filter(t => manhãIds.has(t.id));
  const customManhã = tarefas.filter(t => !manhãIds.has(t.id) && t.turno === 'manhã');
  const itensTarde = tarefas.filter(t => !manhãIds.has(t.id) && t.turno !== 'manhã' && !t.id.startsWith('custom_'));
  const customTarde = tarefas.filter(t => t.id.startsWith('custom_') && t.turno !== 'manhã');

  if (itensManhã.length || customManhã.length) {
    html += `<div class="periodo-label">${LABELS_MANHÃ[dia] || 'Manhã'}</div>`;
    for (const t of [...itensManhã, ...customManhã]) html += renderTarefa(t, !!checks[t.id], dia, wk);
  }
  if (itensTarde.length || customTarde.length) {
    html += `<div class="periodo-label">${LABELS_TARDE[dia] || 'Tarde'}</div>`;
    for (const t of [...itensTarde, ...customTarde]) html += renderTarefa(t, !!checks[t.id], dia, wk);
  }

  html += renderAddSection(dia, true, wk);

  const doneCount = tarefas.filter(t => checks[t.id]).length;
  if (doneCount > 0) {
    html += `<div class="actions-row">
      <button class="btn-clear" onclick="clearDoneFutura('${wk}','${dia}')">🗑️ Remover concluídas (${doneCount})</button>
      <button class="btn-clear" onclick="uncheckAllFutura('${wk}','${dia}')" style="border-color:rgba(123,47,190,0.3);color:rgba(155,63,222,0.7)">↺ Desmarcar todas</button>
    </div>`;
  }

  document.getElementById('main').innerHTML = html;
}

function renderAddSection(dia, isFutura, weekKey) {
  const ctx = isFutura ? `futura_${weekKey}_${dia}` : dia;
  return `<div class="add-section">
    <div class="add-title">➕ Adicionar tarefa — ${dia}</div>
    <div class="add-row">
      <input class="add-input" id="novaTexto_${ctx}" placeholder="Descreva a tarefa..." onkeydown="if(event.key==='Enter') addTarefa('${ctx}','${isFutura}','${weekKey || ''}','${dia}')">
      <select class="add-select" id="novaCat_${ctx}">
        <option value="comunicacao">Comunicação</option>
        <option value="financeiro">Financeiro</option>
        <option value="alunos">Alunos</option>
        <option value="conteudo">Conteúdo</option>
        <option value="operacional">Operacional</option>
        <option value="estrategico">Estratégico</option>
        <option value="custom">Outro</option>
      </select>
      <select class="add-select" id="novoTurno_${ctx}">
        <option value="manhã">☀️ Manhã</option>
        <option value="tarde">🌙 Tarde</option>
      </select>
      <button class="btn-add" onclick="addTarefa('${ctx}','${isFutura}','${weekKey || ''}','${dia}')">Adicionar</button>
    </div>
  </div>`;
}

function renderTarefa(t, isDone, dia, weekKey) {
  const wkStr = weekKey || '';
  const isFutura = !!weekKey;
  return `<div class="tarefa-item ${isDone ? 'done' : ''}" onclick="toggleCheck('${dia}','${t.id}','${isFutura}','${wkStr}')">
    <div class="check-box"><span class="check-icon">✓</span></div>
    <div class="dot ${t.cat}"></div>
    <div class="tarefa-texto">${t.texto}</div>
    <div class="tarefa-meta">
      ${t.turno ? `<span class="turno-badge">${t.turno === 'manhã' ? '☀️' : '🌙'}</span>` : ''}
      ${t.freq ? `<span class="freq-badge">${t.freq}</span>` : ''}
      <button class="btn-delete" onclick="event.stopPropagation(); deleteTarefa('${dia}','${t.id}','${isFutura}','${wkStr}')">✕</button>
    </div>
  </div>`;
}

function renderHistorico() {
  const hist = (state.historico || []).slice(-50).reverse();
  const semanas = (state.historicoSemanas || []).slice().reverse();
  let html = '';
  if (!hist.length) {
    html += `<div style="color:#444;font-size:0.8rem;padding:0.5rem 0">Nenhuma tarefa concluída esta semana ainda.</div>`;
  } else {
    const grupos = {};
    for (const h of hist) {
      const key = h.data || 'Sem data';
      if (!grupos[key]) grupos[key] = [];
      grupos[key].push(h);
    }
    for (const [data, items] of Object.entries(grupos)) {
      html += `<div class="hist-dia"><div class="hist-dia-label">${data}</div>`;
      for (const item of items) {
        html += `<div class="hist-item"><span class="hist-check">✓</span><span>${item.texto}</span><span class="hist-data">${item.dia} · ${item.hora||''}</span></div>`;
      }
      html += `</div>`;
    }
  }
  if (semanas.length) {
    html += `<div style="margin-top:1rem;padding-top:0.8rem;border-top:1px solid #252525;">
      <div style="font-size:0.65rem;text-transform:uppercase;letter-spacing:0.1em;color:#7B2FBE;font-weight:600;margin-bottom:0.6rem;">Semanas anteriores</div>`;
    for (const s of semanas) {
      const total = Object.values(s.checks||{}).reduce((acc,d)=>acc+Object.values(d).filter(Boolean).length,0);
      html += `<div style="font-size:0.75rem;color:#666;padding:0.3rem 0;border-bottom:1px solid #1a1a1a;">
        📅 ${s.semana} — <span style="color:#22C55E">${total} tarefas concluídas</span></div>`;
    }
    html += `</div>`;
  }
  return html;
}

// =====================
// ACTIONS
// =====================
function selectDia(dia) {
  diaSelected = dia;
  semanaFuturaSelected = null;
  renderTabs();
  renderMain();
}

function selectSemanaFutura(wk) {
  semanaFuturaSelected = wk;
  diaFuturoSelected = 'Segunda';
  renderTabs();
  renderMain();
}

function selectDiaFuturo(dia) {
  diaFuturoSelected = dia;
  renderMain();
}

function toggleCheck(dia, id, isFutura, weekKey) {
  isFutura = isFutura === 'true';
  let checks, tarefas;
  if (isFutura && weekKey) {
    const chkKey = 'fut_' + weekKey + '_' + dia;
    if (!state.checks[chkKey]) state.checks[chkKey] = {};
    checks = state.checks[chkKey];
    tarefas = (state.tarefasFuturas[weekKey] || {})[dia] || [];
  } else {
    if (!state.checks[dia]) state.checks[dia] = {};
    checks = state.checks[dia];
    tarefas = state.tarefas[dia] || [];
  }
  const wasDone = !!checks[id];
  checks[id] = !wasDone;
  if (!wasDone) {
    const tarefa = tarefas.find(t => t.id === id);
    if (tarefa) {
      if (!state.historico) state.historico = [];
      const agora = new Date();
      state.historico.push({ id, dia, texto: tarefa.texto, data: agora.toLocaleDateString('pt-BR'), hora: agora.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}) });
      showToast('✓ Tarefa concluída!');
    }
  }
  saveState();
  renderTabs();
  renderMain();
}

function deleteTarefa(dia, id, isFutura, weekKey) {
  isFutura = isFutura === 'true';
  if (isFutura && weekKey) {
    if (state.tarefasFuturas[weekKey] && state.tarefasFuturas[weekKey][dia]) {
      state.tarefasFuturas[weekKey][dia] = state.tarefasFuturas[weekKey][dia].filter(t => t.id !== id);
    }
    const chkKey = 'fut_' + weekKey + '_' + dia;
    if (state.checks[chkKey]) delete state.checks[chkKey][id];
  } else {
    state.tarefas[dia] = (state.tarefas[dia] || []).filter(t => t.id !== id);
    if (state.checks[dia]) delete state.checks[dia][id];
  }
  saveState();
  renderTabs();
  renderMain();
  showToast('Tarefa removida');
}

function addTarefa(ctx, isFutura, weekKey, dia) {
  isFutura = isFutura === 'true';
  const input = document.getElementById('novaTexto_' + ctx);
  const cat = document.getElementById('novaCat_' + ctx).value;
  const turno = document.getElementById('novoTurno_' + ctx).value;
  const texto = input.value.trim();
  if (!texto) { input.focus(); return; }
  const id = 'custom_' + Date.now();
  const nova = { id, texto, cat, freq:'manual', turno };
  if (isFutura && weekKey) {
    if (!state.tarefasFuturas[weekKey]) state.tarefasFuturas[weekKey] = {};
    if (!state.tarefasFuturas[weekKey][dia]) state.tarefasFuturas[weekKey][dia] = [];
    state.tarefasFuturas[weekKey][dia].push(nova);
  } else {
    if (!state.tarefas[dia]) state.tarefas[dia] = [];
    state.tarefas[dia].push(nova);
  }
  saveState();
  renderTabs();
  renderMain();
  showToast('Tarefa adicionada!');
}

function clearDone() {
  const dia = diaSelected;
  const checks = state.checks[dia] || {};
  state.tarefas[dia] = (state.tarefas[dia] || []).filter(t => !checks[t.id]);
  const ids = new Set(state.tarefas[dia].map(t => t.id));
  for (const id of Object.keys(checks)) { if (!ids.has(id)) delete state.checks[dia][id]; }
  saveState(); renderTabs(); renderMain();
  showToast('Concluídas removidas 🗑️');
}

function clearDoneFutura(wk, dia) {
  const chkKey = 'fut_' + wk + '_' + dia;
  const checks = state.checks[chkKey] || {};
  if (state.tarefasFuturas[wk] && state.tarefasFuturas[wk][dia]) {
    state.tarefasFuturas[wk][dia] = state.tarefasFuturas[wk][dia].filter(t => !checks[t.id]);
  }
  saveState(); renderTabs(); renderMain();
  showToast('Concluídas removidas 🗑️');
}

function uncheckAll() {
  state.checks[diaSelected] = {};
  saveState(); renderTabs(); renderMain();
}

function uncheckAllFutura(wk, dia) {
  state.checks['fut_' + wk + '_' + dia] = {};
  saveState(); renderTabs(); renderMain();
}

function toggleHistorico() {
  historicoOpen = !historicoOpen;
  renderMain();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function updateDataHoje() {
  const agora = new Date();
  document.getElementById('dataHoje').innerHTML = agora.toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'}).replace(',','<br>');
}

// INIT
updateDataHoje();
renderTabs();
renderMain();
</script>
</body>
</html>
