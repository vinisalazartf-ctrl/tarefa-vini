<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roteiro Semanal — Vini Salazar</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --roxo: #7B2FBE;
    --roxo-vivo: #9B3FDE;
    --roxo-light: rgba(123,47,190,0.15);
    --prata: #A0A0A0;
    --branco: #F0F0F0;
    --fundo: #0A0A0A;
    --card: #131313;
    --card2: #1A1A1A;
    --borda: #252525;
    --verde: #22C55E;
    --vermelho: #EF4444;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--fundo);
    color: var(--branco);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding-bottom: 4rem;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #0A0A0A 0%, #1a0a2e 100%);
    border-bottom: 1px solid var(--borda);
    padding: 1.2rem 1rem 1rem;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.8rem;
  }

  .header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    letter-spacing: 0.08em;
    line-height: 1;
    text-shadow: 0 0 30px rgba(123,47,190,0.7);
  }

  .header h1 span { color: var(--roxo-vivo); }

  .data-hoje {
    font-size: 0.72rem;
    color: var(--prata);
    text-align: right;
    letter-spacing: 0.05em;
  }

  /* TABS DIAS */
  .tabs-wrapper {
    overflow-x: auto;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  .tabs-wrapper::-webkit-scrollbar { display: none; }

  .tabs {
    display: flex;
    gap: 0.4rem;
    padding-bottom: 0.1rem;
    width: max-content;
  }

  .tab {
    padding: 0.4rem 0.9rem;
    border-radius: 8px;
    border: 1px solid var(--borda);
    background: transparent;
    color: var(--prata);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    letter-spacing: 0.03em;
  }

  .tab:hover { border-color: var(--roxo-vivo); color: var(--branco); }

  .tab.active {
    background: var(--roxo);
    border-color: var(--roxo-vivo);
    color: #fff;
  }

  .tab.hoje-tab {
    border-color: var(--roxo-vivo);
    color: var(--roxo-vivo);
  }

  .tab .prog {
    display: inline-block;
    margin-left: 0.3rem;
    font-size: 0.65rem;
    opacity: 0.8;
  }

  /* MAIN */
  .main {
    padding: 1rem;
    max-width: 680px;
    margin: 0 auto;
  }

  /* PROGRESS BAR */
  .progress-card {
    background: var(--card);
    border: 1px solid var(--borda);
    border-radius: 12px;
    padding: 0.9rem 1rem;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .progress-info { flex: 1; }

  .progress-label {
    font-size: 0.72rem;
    color: var(--prata);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }

  .progress-bar-bg {
    height: 6px;
    background: var(--borda);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--roxo), var(--roxo-vivo));
    border-radius: 99px;
    transition: width 0.4s ease;
  }

  .progress-pct {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    color: var(--roxo-vivo);
    letter-spacing: 0.05em;
    line-height: 1;
  }

  /* PERIODO */
  .periodo-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--prata);
    font-weight: 600;
    padding-left: 0.5rem;
    border-left: 2px solid var(--roxo-vivo);
    margin: 1rem 0 0.5rem;
  }

  /* TAREFAS */
  .tarefa-item {
    display: flex;
    align-items: flex-start;
    gap: 0.7rem;
    padding: 0.6rem 0.8rem;
    border-radius: 10px;
    background: var(--card);
    border: 1px solid var(--borda);
    margin-bottom: 0.35rem;
    transition: all 0.2s;
    cursor: pointer;
  }

  .tarefa-item:hover { border-color: rgba(123,47,190,0.4); background: rgba(123,47,190,0.07); }

  .tarefa-item.done {
    opacity: 0.45;
    background: rgba(34,197,94,0.04);
    border-color: rgba(34,197,94,0.15);
  }

  .check-box {
    width: 18px;
    height: 18px;
    border-radius: 5px;
    border: 2px solid var(--borda);
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    background: transparent;
  }

  .tarefa-item.done .check-box {
    background: var(--verde);
    border-color: var(--verde);
  }

  .check-icon {
    display: none;
    color: #fff;
    font-size: 11px;
    font-weight: 700;
  }

  .tarefa-item.done .check-icon { display: block; }

  .tarefa-texto {
    flex: 1;
    font-size: 0.82rem;
    line-height: 1.4;
    color: var(--branco);
  }

  .tarefa-item.done .tarefa-texto {
    text-decoration: line-through;
    color: var(--prata);
  }

  .tarefa-meta {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    flex-shrink: 0;
  }

  .freq-badge {
    font-size: 0.58rem;
    padding: 0.15rem 0.4rem;
    border-radius: 4px;
    background: rgba(255,255,255,0.05);
    color: var(--prata);
    font-weight: 500;
    letter-spacing: 0.03em;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 4px;
  }

  .dot.comunicacao { background: #3B82F6; }
  .dot.financeiro  { background: #22C55E; }
  .dot.alunos      { background: #F97316; }
  .dot.conteudo    { background: #A855F7; }
  .dot.operacional { background: #EAB308; }
  .dot.estrategico { background: #EF4444; }
  .dot.custom      { background: var(--prata); }

  .btn-delete {
    background: none;
    border: none;
    color: #555;
    cursor: pointer;
    font-size: 0.9rem;
    padding: 0 0.1rem;
    transition: color 0.2s;
    line-height: 1;
  }

  .btn-delete:hover { color: var(--vermelho); }

  /* ADD TAREFA */
  .add-section {
    margin-top: 1.5rem;
    background: var(--card);
    border: 1px solid var(--borda);
    border-radius: 12px;
    padding: 1rem;
  }

  .add-title {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--prata);
    font-weight: 600;
    margin-bottom: 0.7rem;
  }

  .add-row {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .add-input {
    flex: 1;
    min-width: 180px;
    background: var(--card2);
    border: 1px solid var(--borda);
    border-radius: 8px;
    color: var(--branco);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    padding: 0.55rem 0.8rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .add-input:focus { border-color: var(--roxo-vivo); }
  .add-input::placeholder { color: #555; }

  .add-select {
    background: var(--card2);
    border: 1px solid var(--borda);
    border-radius: 8px;
    color: var(--prata);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    padding: 0.55rem 0.7rem;
    outline: none;
    cursor: pointer;
  }

  .add-select:focus { border-color: var(--roxo-vivo); }

  .btn-add {
    background: var(--roxo);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    padding: 0.55rem 1.1rem;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }

  .btn-add:hover { background: var(--roxo-vivo); }

  /* HISTÓRICO */
  .historico-btn {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    width: 100%;
    background: none;
    border: 1px solid var(--borda);
    border-radius: 10px;
    color: var(--prata);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    font-weight: 600;
    padding: 0.65rem 0.9rem;
    cursor: pointer;
    margin-top: 1.5rem;
    transition: all 0.2s;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .historico-btn:hover { border-color: var(--roxo-vivo); color: var(--branco); }

  .historico-panel {
    display: none;
    margin-top: 0.5rem;
    background: var(--card);
    border: 1px solid var(--borda);
    border-radius: 12px;
    padding: 1rem;
  }

  .historico-panel.open { display: block; }

  .hist-dia {
    margin-bottom: 1rem;
  }

  .hist-dia-label {
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--roxo-vivo);
    font-weight: 600;
    margin-bottom: 0.4rem;
  }

  .hist-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.78rem;
    color: var(--prata);
    padding: 0.3rem 0;
    border-bottom: 1px solid var(--borda);
  }

  .hist-item:last-child { border-bottom: none; }

  .hist-check { color: var(--verde); font-size: 0.8rem; }
  .hist-pending { color: #555; font-size: 0.8rem; }

  .hist-data {
    margin-left: auto;
    font-size: 0.65rem;
    color: #444;
  }

  /* LIMPAR */
  .actions-row {
    display: flex;
    gap: 0.5rem;
    margin-top: 1rem;
    flex-wrap: wrap;
  }

  .btn-clear {
    background: none;
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 8px;
    color: rgba(239,68,68,0.7);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    padding: 0.45rem 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-clear:hover { border-color: var(--vermelho); color: var(--vermelho); }

  .empty-state {
    text-align: center;
    padding: 2rem 1rem;
    color: #444;
    font-size: 0.82rem;
  }

  .toast {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--roxo);
    color: #fff;
    padding: 0.6rem 1.2rem;
    border-radius: 99px;
    font-size: 0.8rem;
    font-weight: 600;
    z-index: 999;
    transition: transform 0.3s ease;
    white-space: nowrap;
    box-shadow: 0 4px 20px rgba(123,47,190,0.5);
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <h1>ROTEIRO <span>SEMANAL</span></h1>
    <div class="data-hoje" id="dataHoje"></div>
  </div>
  <div class="tabs-wrapper">
    <div class="tabs" id="tabs"></div>
  </div>
</div>

<div class="main" id="main"></div>

<div class="toast" id="toast"></div>

<script>
// =====================
// DADOS INICIAIS
// =====================
const DIAS = ['Segunda','Terça','Quarta','Quinta','Sexta','Mensal'];

const TAREFAS_INICIAIS = {
  Segunda: [
    { id:'seg1', texto:'WhatsApp — responder antes da Carina chegar', cat:'comunicacao', freq:'diário' },
    { id:'seg2', texto:'Pagamentos do dia', cat:'financeiro', freq:'diário' },
    { id:'seg3', texto:'Alunos com pagamento pendente — verificar lista', cat:'financeiro', freq:'semanal' },
    { id:'seg4', texto:'Planejamento da semana — definir prioridades', cat:'estrategico', freq:'semanal' },
    { id:'seg5', texto:'Calendário de conteúdo — planejar posts da semana', cat:'conteudo', freq:'semanal' },
    { id:'seg6', texto:'Ver alunos faltantes e enviar mensagem de retorno', cat:'alunos', freq:'semanal', periodo:'tarde' },
    { id:'seg7', texto:'Verificar renovações de plano da semana', cat:'alunos', freq:'semanal', periodo:'tarde' },
    { id:'seg8', texto:'Criar carrossel ou gravar vídeo para o Instagram', cat:'conteudo', freq:'semanal', periodo:'tarde' },
    { id:'seg9', texto:'Tecnofit — registro de leads e novos alunos', cat:'operacional', freq:'semanal', periodo:'tarde' },
  ],
  Terça: [
    { id:'ter1', texto:'WhatsApp — responder antes da Carina chegar', cat:'comunicacao', freq:'diário' },
    { id:'ter2', texto:'Pagamentos do dia', cat:'financeiro', freq:'diário' },
    { id:'ter3', texto:'Acompanhamento individual de alunos', cat:'alunos', freq:'semanal' },
    { id:'ter4', texto:'Criar carrossel ou gravar vídeo para o Instagram', cat:'conteudo', freq:'semanal', periodo:'tarde' },
    { id:'ter5', texto:'Enviar propostas de renovação de plano', cat:'alunos', freq:'semanal', periodo:'tarde' },
    { id:'ter6', texto:'Ações de retenção — pensar e executar iniciativa da semana', cat:'estrategico', freq:'semanal', periodo:'tarde' },
    { id:'ter7', texto:'Verificar estoque de materiais e equipamentos', cat:'operacional', freq:'semanal', periodo:'tarde' },
  ],
  Quarta: [
    { id:'qua1', texto:'WhatsApp — responder mensagens pendentes', cat:'comunicacao', freq:'diário' },
    { id:'qua2', texto:'Pagamentos do dia', cat:'financeiro', freq:'diário' },
    { id:'qua3', texto:'Responder comentários e DMs do Instagram', cat:'conteudo', freq:'diário' },
    { id:'qua4', texto:'Controle financeiro — entradas e saídas da semana', cat:'financeiro', freq:'semanal', periodo:'tarde' },
    { id:'qua5', texto:'Manutenção do estúdio — verificar necessidades', cat:'operacional', freq:'semanal', periodo:'tarde' },
    { id:'qua6', texto:'Programa de recompensas — acompanhar/atualizar (Perdigão)', cat:'estrategico', freq:'semanal', periodo:'tarde' },
    { id:'qua7', texto:'Atualizar site (Emergent) se necessário', cat:'conteudo', freq:'quinzenal', periodo:'tarde' },
  ],
  Quinta: [
    { id:'qui1', texto:'WhatsApp — responder antes da Carina chegar', cat:'comunicacao', freq:'diário' },
    { id:'qui2', texto:'Pagamentos do dia', cat:'financeiro', freq:'diário' },
    { id:'qui3', texto:'Acompanhamento de alunos em risco de cancelamento', cat:'alunos', freq:'semanal' },
    { id:'qui4', texto:'Criar conteúdo para o Instagram (post ou reels)', cat:'conteudo', freq:'semanal', periodo:'tarde' },
    { id:'qui5', texto:'Planejar evento ou ação especial no estúdio', cat:'alunos', freq:'mensal', periodo:'tarde' },
    { id:'qui6', texto:'Planejamento de campanhas e promoções', cat:'estrategico', freq:'quinzenal', periodo:'tarde' },
    { id:'qui7', texto:'Tecnofit — atualizar contratos e planos', cat:'operacional', freq:'semanal', periodo:'tarde' },
  ],
  Sexta: [
    { id:'sex0', texto:'📘 Enviar GUIA DO ALUNO para alunos novos da semana', cat:'alunos', freq:'semanal' },
    { id:'sex1', texto:'WhatsApp — responder mensagens pendentes', cat:'comunicacao', freq:'diário' },
    { id:'sex2', texto:'Pagamentos do dia', cat:'financeiro', freq:'diário' },
    { id:'sex3', texto:'Métricas do Instagram — analisar semana', cat:'conteudo', freq:'semanal' },
    { id:'sex4', texto:'Atualizar planilha de controle mensal (alunos ativos, novos, metas)', cat:'financeiro', freq:'semanal', periodo:'tarde' },
    { id:'sex5', texto:'Revisão da semana — o que funcionou, o que ficou pendente', cat:'estrategico', freq:'semanal', periodo:'tarde' },
    { id:'sex6', texto:'Ações de retenção — checar resultado das mensagens enviadas', cat:'alunos', freq:'semanal', periodo:'tarde' },
    { id:'sex7', texto:'Preparar conteúdo do final de semana se necessário', cat:'conteudo', freq:'semanal', periodo:'tarde' },
  ],
  Mensal: [
    { id:'men1', texto:'📨 Dia 1: Enviar msg de renovação (Samuel) — mês corrente + mês seguinte', cat:'alunos', freq:'mensal' },
    { id:'men2', texto:'📨 2ª segunda-feira: Enviar msg abrindo renovação antecipada', cat:'alunos', freq:'mensal' },
    { id:'men3', texto:'Fechamento financeiro do mês anterior — fluxo de caixa', cat:'financeiro', freq:'mensal' },
    { id:'men4', texto:'Análise de inadimplência consolidada', cat:'financeiro', freq:'mensal' },
    { id:'men5', texto:'Revisão de metas — alunos ativos, novos, evasão', cat:'alunos', freq:'mensal' },
    { id:'men6', texto:'Reunião/alinhamento com Perdigão — programa de recompensas', cat:'estrategico', freq:'mensal' },
    { id:'men7', texto:'Planejamento do evento do mês no estúdio', cat:'alunos', freq:'mensal' },
    { id:'men8', texto:'Revisão do programa online de prevenção de quedas (idosos)', cat:'estrategico', freq:'mensal' },
    { id:'men9', texto:'Manutenção e melhorias no estúdio (vestiário, equipamentos)', cat:'operacional', freq:'mensal' },
  ]
};

const PERIODOS = {
  Segunda: [
    { label: 'Manhã — 09h às 11h', ids: ['seg1','seg2','seg3','seg4','seg5'] },
    { label: 'Tarde — 14h às 17h', ids: ['seg6','seg7','seg8','seg9'] }
  ],
  Terça: [
    { label: 'Manhã — 09h às 10h30', ids: ['ter1','ter2','ter3'] },
    { label: 'Tarde — 14h às 17h', ids: ['ter4','ter5','ter6','ter7'] }
  ],
  Quarta: [
    { label: 'Manhã — 11h às 12h (pós-treino)', ids: ['qua1','qua2','qua3'] },
    { label: 'Tarde — 14h às 17h', ids: ['qua4','qua5','qua6','qua7'] }
  ],
  Quinta: [
    { label: 'Manhã — 09h às 10h30', ids: ['qui1','qui2','qui3'] },
    { label: 'Tarde — 14h às 17h', ids: ['qui4','qui5','qui6','qui7'] }
  ],
  Sexta: [
    { label: 'Manhã — 11h às 12h (pós-treino)', ids: ['sex0','sex1','sex2','sex3'] },
    { label: 'Tarde — 14h às 17h (fechamento)', ids: ['sex4','sex5','sex6','sex7'] }
  ],
  Mensal: [
    { label: 'Tarefas Mensais', ids: ['men1','men2','men3','men4','men5','men6','men7','men8','men9'] }
  ]
};

// =====================
// STATE & STORAGE
// =====================
const STORAGE_KEY = 'vini_roteiro_v2';

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  // Init: clonar tarefas iniciais
  const state = { tarefas: {}, checks: {}, historico: [] };
  for (const dia of DIAS) {
    state.tarefas[dia] = JSON.parse(JSON.stringify(TAREFAS_INICIAIS[dia]));
    state.checks[dia] = {};
  }
  return state;
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

let state = loadState();

// Garantir que novos dias iniciais sejam adicionados se não existirem
for (const dia of DIAS) {
  if (!state.tarefas[dia]) state.tarefas[dia] = JSON.parse(JSON.stringify(TAREFAS_INICIAIS[dia]));
  if (!state.checks[dia]) state.checks[dia] = {};
}
saveState();

// =====================
// CURRENT DIA
// =====================
const JS_DIA_MAP = { 0:'Mensal', 1:'Segunda', 2:'Terça', 3:'Quarta', 4:'Quinta', 5:'Sexta', 6:'Mensal' };
let diaAtual = JS_DIA_MAP[new Date().getDay()] || 'Segunda';
let diaSelected = diaAtual;
let historicoOpen = false;

// =====================
// RENDER
// =====================
function getDiaLabel(dia) {
  if (dia === 'Mensal') return '📅 Mensal';
  return dia;
}

function getPct(dia) {
  const tarefas = state.tarefas[dia] || [];
  if (!tarefas.length) return 0;
  const done = tarefas.filter(t => state.checks[dia][t.id]).length;
  return Math.round((done / tarefas.length) * 100);
}

function renderTabs() {
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = DIAS.map(dia => {
    const pct = getPct(dia);
    const isHoje = dia === diaAtual;
    const isSelected = dia === diaSelected;
    return `<button class="tab ${isSelected ? 'active' : ''} ${isHoje && !isSelected ? 'hoje-tab' : ''}" onclick="selectDia('${dia}')">
      ${getDiaLabel(dia)}${isHoje && dia !== 'Mensal' ? ' 🔥' : ''}
      <span class="prog">${pct}%</span>
    </button>`;
  }).join('');
}

function renderMain() {
  const dia = diaSelected;
  const tarefas = state.tarefas[dia] || [];
  const checks = state.checks[dia] || {};
  const pct = getPct(dia);
  const done = tarefas.filter(t => checks[t.id]).length;

  // Periodos
  const periodos = PERIODOS[dia] || [{ label: dia, ids: tarefas.map(t => t.id) }];
  // Pegar IDs que têm período definido
  const idsComPeriodo = new Set(periodos.flatMap(p => p.ids));
  // Tarefas customizadas (adicionadas pelo usuário que não têm período)
  const tarefasCustom = tarefas.filter(t => !idsComPeriodo.has(t.id));

  let html = `
    <div class="progress-card">
      <div class="progress-info">
        <div class="progress-label">Progresso de hoje — ${dia === 'Mensal' ? 'Mensal' : dia}</div>
        <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="progress-pct">${pct}%</div>
    </div>`;

  // Renderizar por períodos
  for (const periodo of periodos) {
    const tarefasDoPeriodo = periodo.ids
      .map(id => tarefas.find(t => t.id === id))
      .filter(Boolean);

    if (!tarefasDoPeriodo.length) continue;

    html += `<div class="periodo-label">${periodo.label}</div>`;
    for (const t of tarefasDoPeriodo) {
      const isDone = !!checks[t.id];
      html += renderTarefa(t, isDone, dia);
    }
  }

  // Tarefas customizadas
  if (tarefasCustom.length) {
    html += `<div class="periodo-label">Adicionadas por você</div>`;
    for (const t of tarefasCustom) {
      const isDone = !!checks[t.id];
      html += renderTarefa(t, isDone, dia);
    }
  }

  if (!tarefas.length) {
    html += `<div class="empty-state">Nenhuma tarefa neste dia.<br>Adicione uma abaixo 👇</div>`;
  }

  // Add tarefa
  html += `
    <div class="add-section">
      <div class="add-title">➕ Adicionar tarefa em ${getDiaLabel(dia)}</div>
      <div class="add-row">
        <input class="add-input" id="novaTexto" placeholder="Descreva a tarefa..." onkeydown="if(event.key==='Enter') addTarefa()">
        <select class="add-select" id="novaCat">
          <option value="comunicacao">Comunicação</option>
          <option value="financeiro">Financeiro</option>
          <option value="alunos">Alunos</option>
          <option value="conteudo">Conteúdo</option>
          <option value="operacional">Operacional</option>
          <option value="estrategico">Estratégico</option>
          <option value="custom">Outro</option>
        </select>
        <button class="btn-add" onclick="addTarefa()">Adicionar</button>
      </div>
    </div>`;

  // Ações
  const doneCount = tarefas.filter(t => checks[t.id]).length;
  if (doneCount > 0) {
    html += `<div class="actions-row">
      <button class="btn-clear" onclick="clearDone()">🗑️ Remover concluídas (${doneCount})</button>
      <button class="btn-clear" onclick="uncheckAll()" style="border-color:rgba(123,47,190,0.3);color:rgba(155,63,222,0.7)">↺ Desmarcar todas</button>
    </div>`;
  }

  // Histórico
  html += `<button class="historico-btn" onclick="toggleHistorico()">
    📋 Histórico de tarefas concluídas ${historicoOpen ? '▲' : '▼'}
  </button>
  <div class="historico-panel ${historicoOpen ? 'open' : ''}" id="historicoPanel">
    ${renderHistorico()}
  </div>`;

  document.getElementById('main').innerHTML = html;
}

function renderTarefa(t, isDone, dia) {
  return `<div class="tarefa-item ${isDone ? 'done' : ''}" onclick="toggleCheck('${dia}','${t.id}')">
    <div class="check-box"><span class="check-icon">✓</span></div>
    <div class="dot ${t.cat}"></div>
    <div class="tarefa-texto">${t.texto}</div>
    <div class="tarefa-meta">
      ${t.freq ? `<span class="freq-badge">${t.freq}</span>` : ''}
      <button class="btn-delete" onclick="event.stopPropagation(); deleteTarefa('${dia}','${t.id}')">✕</button>
    </div>
  </div>`;
}

function renderHistorico() {
  const hist = (state.historico || []).slice(-50).reverse();
  if (!hist.length) return `<div style="color:#444;font-size:0.8rem;padding:0.5rem 0">Nenhuma tarefa concluída ainda.</div>`;

  // Agrupar por data
  const grupos = {};
  for (const h of hist) {
    const key = h.data || 'Sem data';
    if (!grupos[key]) grupos[key] = [];
    grupos[key].push(h);
  }

  let html = '';
  for (const [data, items] of Object.entries(grupos)) {
    html += `<div class="hist-dia">
      <div class="hist-dia-label">${data}</div>`;
    for (const item of items) {
      html += `<div class="hist-item">
        <span class="hist-check">✓</span>
        <span>${item.texto}</span>
        <span class="hist-data">${item.dia} · ${item.hora || ''}</span>
      </div>`;
    }
    html += `</div>`;
  }
  return html;
}

// =====================
// ACTIONS
// =====================
function selectDia(dia) {
  diaSelected = dia;
  renderTabs();
  renderMain();
}

function toggleCheck(dia, id) {
  if (!state.checks[dia]) state.checks[dia] = {};
  const wasDone = !!state.checks[dia][id];
  state.checks[dia][id] = !wasDone;

  if (!wasDone) {
    // Adicionar ao histórico
    const tarefa = (state.tarefas[dia] || []).find(t => t.id === id);
    if (tarefa) {
      if (!state.historico) state.historico = [];
      const agora = new Date();
      state.historico.push({
        id: id,
        dia: dia,
        texto: tarefa.texto,
        data: agora.toLocaleDateString('pt-BR'),
        hora: agora.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' })
      });
      showToast('✓ Tarefa concluída!');
    }
  }

  saveState();
  renderTabs();
  renderMain();
}

function deleteTarefa(dia, id) {
  state.tarefas[dia] = (state.tarefas[dia] || []).filter(t => t.id !== id);
  delete state.checks[dia][id];
  saveState();
  renderMain();
  showToast('Tarefa removida');
}

function addTarefa() {
  const input = document.getElementById('novaTexto');
  const select = document.getElementById('novaCat');
  const texto = input.value.trim();
  if (!texto) { input.focus(); return; }

  const id = 'custom_' + Date.now();
  const nova = { id, texto, cat: select.value, freq: 'manual' };
  if (!state.tarefas[diaSelected]) state.tarefas[diaSelected] = [];
  state.tarefas[diaSelected].push(nova);
  saveState();
  renderMain();
  showToast('Tarefa adicionada!');
}

function clearDone() {
  const dia = diaSelected;
  const checks = state.checks[dia] || {};
  // Registrar no histórico que foram finalizadas
  state.tarefas[dia] = (state.tarefas[dia] || []).filter(t => !checks[t.id]);
  // Limpar checks das removidas
  const idsRestantes = new Set(state.tarefas[dia].map(t => t.id));
  for (const id of Object.keys(checks)) {
    if (!idsRestantes.has(id)) delete state.checks[dia][id];
  }
  saveState();
  renderTabs();
  renderMain();
  showToast('Concluídas removidas 🗑️');
}

function uncheckAll() {
  state.checks[diaSelected] = {};
  saveState();
  renderTabs();
  renderMain();
}

function toggleHistorico() {
  historicoOpen = !historicoOpen;
  renderMain();
}

// =====================
// TOAST
// =====================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// =====================
// DATA HOJE
// =====================
function updateDataHoje() {
  const agora = new Date();
  const opts = { weekday:'long', day:'numeric', month:'long' };
  document.getElementById('dataHoje').innerHTML = agora.toLocaleDateString('pt-BR', opts).replace(',','<br>');
}

// =====================
// INIT
// =====================
updateDataHoje();
renderTabs();
renderMain();
</script>
</body>
</html>
